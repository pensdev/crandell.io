# Include inside the `server { ... }` block for crandell.io (HTTPS), *above* `location /`.
# Proxies the FastAPI app so the browser can call https://crandell.io/simulate with
# NEXT_PUBLIC_API_URL=https://crandell.io
#
# Prerequisite: uvicorn listening on 127.0.0.1:8000, e.g.
#   cd /var/www/crandell.io/apps/api && uvicorn main:app --host 127.0.0.1 --port 8000
#
# After editing nginx: sudo nginx -t && sudo systemctl reload nginx

location /simulate {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /health {
    proxy_pass http://127.0.0.1:8000/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /docs {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /openapi.json {
    proxy_pass http://127.0.0.1:8000/openapi.json;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}
