# FastAPI proxy — include inside the HTTPS server { } for crandell.io, *before* `location /`.
#
# In /etc/nginx/sites-available/crandell.io add (after real_ip_header, before location /):
#   include /etc/nginx/snippets/crandell-api-proxy.conf;
#
# Then:
#   sudo cp /var/www/crandell.io/deploy/snippets/crandell-api-proxy.conf /etc/nginx/snippets/crandell-api-proxy.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# API must be listening: 127.0.0.1:8000 (systemd: deploy/policy-api.service)

location /simulate {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /health {
    proxy_pass http://127.0.0.1:8000/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /docs {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /openapi.json {
    proxy_pass http://127.0.0.1:8000/openapi.json;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}
